<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PT. Dian Pilar Utama | Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..600,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            brand: { 50: '#f4f6f8', 100: '#e4e8ed', 500: '#3b82f6', 600: '#2563eb', 900: '#0f172a' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-[400px] bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <div class="flex items-center space-x-2 mb-8">
      <div class="w-8 h-8 rounded bg-brand-900 flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-sm">inventory_2</span>
      </div>
      <h1 class="font-semibold text-lg tracking-tight">Dian Pilar Utama</h1>
    </div>
    
    <h2 class="text-xl font-semibold mb-1">Sign in to your account</h2>
    <p class="text-xs text-gray-500 mb-6">Enter your email and password to access the workspace.</p>
    
    <form action="office-select.html" class="space-y-4">
      <div class="space-y-1.5">
        <label class="block text-xs font-medium text-gray-700" for="email">Work Email</label>
        <input id="email" type="email" placeholder="name@company.com" class="w-full px-3 py-2 bg-white rounded-md border border-gray-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-colors" />
      </div>
      <div class="space-y-1.5">
        <div class="flex justify-between items-center">
          <label class="block text-xs font-medium text-gray-700" for="password">Password</label>
          <a href="#" class="text-xs text-brand-600 hover:text-brand-900">Forgot password?</a>
        </div>
        <input id="password" type="password" placeholder="••••••••" class="w-full px-3 py-2 bg-white rounded-md border border-gray-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-colors" />
      </div>
      <button type="submit" class="w-full py-2.5 mt-2 bg-brand-900 text-white rounded-md text-sm font-medium hover:bg-gray-800 transition-colors">
        Sign in
      </button>
    </form>
    
    <div class="mt-8 pt-6 border-t border-gray-100 flex items-center justify-center space-x-4">
       <a href="office-select.html" class="text-xs text-gray-500 hover:text-gray-900 flex items-center space-x-1">
         <span class="material-symbols-outlined text-[16px]">manage_accounts</span>
         <span>Demo Pimpinan</span>
       </a>
       <span class="text-gray-300">•</span>
       <a href="office-select.html" class="text-xs text-gray-500 hover:text-gray-900 flex items-center space-x-1">
         <span class="material-symbols-outlined text-[16px]">warehouse</span>
         <span>Demo Gudang</span>
       </a>
    </div>
  </div>
</body>
</html>
